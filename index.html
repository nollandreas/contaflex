<html>
  <body>
    Hello World GithubPage
    <p>
    <label for="tableFilter">Filter:</label>
    <input id="tableFilter" type="text" placeholder="Filter eingeben">
    <button id="tableFilterClear" type="button" style="margin-left:8px">Clear</button>
    <table>
      <thead>
        <tr><th>Spalte 1</th><th>Spalte 2</th><th>Spalte 3</th></tr>
      </thead>
      <tbody>
        <tr><td>Andreas AAAA</td><td>Andreas</td><td>Andreas</td></tr>
        <tr><td>Zeiss Ikon</td><td>Ikonta</td><td>Andreas</td></tr>
        <tr><td>Minolta</td><td>Andreas</td><td>Agfa</td></tr>
        <tr><td>Andreas</td><td>Andreas</td><td>Zeiss</td></tr>
        <tr><td>Zeiss</td><td>Andreas</td><td>Systemkamera AAAA</td></tr>
      </tbody>
    </table>
    <h1>Hallo</h1>

    Beispielbild:
    <p>
    <img src="https://drive.google.com/uc?export=view&id=1HnUlyuCJM1k8rN8zpja6Tzh8VixOsIsP" width="200" alt="Beispielbild 1">
    </p>
    <p>
    <img src="./images/xxx_CarlZeissJena_Pancolar1.8-50mm_Zebra_web.JPG" width="640" alt="Beispielbild 2">
    </p>

    Schön, oder?
    <script>
      (function(){
        const input = document.getElementById('tableFilter');
        const table = document.querySelector('table');
        if(!input || !table) return;
        const tbody = table.tBodies[0];
        input.addEventListener('input', function(){
          const q = this.value.trim().toLowerCase();
          Array.from(tbody.rows).forEach(row => {
            const rowText = Array.from(row.cells).map(c => c.textContent.toLowerCase()).join(' ');
            row.style.display = q === '' || rowText.includes(q) ? '' : 'none';
          });
        });
        const clearBtn = document.getElementById('tableFilterClear');
        if(clearBtn){
          clearBtn.addEventListener('click', function(){
            input.value = '';
            input.dispatchEvent(new Event('input'));
            input.focus();
          });
        }
      })();

      // dynamisch aus data.json laden und Tabelle (tbody) füllen
      (async function(){
        const table = document.querySelector('table');
        const tbody = table.tBodies[0];
        try {
          const res = await fetch('./data.json');
          if(!res.ok) throw new Error('fetch failed');
          const rows = await res.json(); // erwartet Array von Arrays oder Array von Objekten
          tbody.innerHTML = '';
          // Beispiel: rows = [{col1:'a',col2:'b',col3:'c'}, ...]
          rows.forEach(r => {
            const tr = document.createElement('tr');
            const vals = Array.isArray(r) ? r : [r.col1, r.col2, r.col3];
            vals.forEach(v => {
              const td = document.createElement('td');
              td.textContent = v ?? '';
              tr.appendChild(td);
            });
            tbody.appendChild(tr);
          });
        } catch(e) {
          console.error(e);
        }
      })();
    </script>
  </body>
</html>
